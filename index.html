<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perritos de Colores 🐶</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== PANTALLA DE VICTORIA ===== -->
  <div id="victory-screen" class="hidden">
    <div class="victory-content">
      <div class="victory-confetti" id="confetti-container"></div>
      <div class="victory-dog">🐶</div>
      <h1 class="victory-title">¡GANADOR!</h1>
      <h2 class="victory-player" id="victory-player-name"></h2>
      <p class="victory-subtitle">¡Reunió 6 perritos primero!</p>
      <div class="victory-scores" id="victory-scores"></div>
      <button class="btn-nueva-partida" onclick="nuevaPartida()">🔄 Nueva Partida</button>
    </div>
  </div>

  <!-- ===== PANTALLA PRINCIPAL ===== -->
  <div id="game-container">

    <!-- ENCABEZADO -->
    <header id="header">
      <div class="header-top">
        <h1 class="game-title">🐶 Perritos de Colores</h1>
      </div>
      <div class="player-config">
        <label class="config-item">
          Jugadores
          <select id="player-count" onchange="actualizarInputsJugadores()">
            <option value="2">2 jugadores</option>
            <option value="3" selected>3 jugadores</option>
            <option value="4">4 jugadores</option>
            <option value="5">5 jugadores</option>
            <option value="6">6 jugadores</option>
            <option value="7">7 jugadores</option>
          </select>
        </label>
        <div class="player-name-inputs" id="player-name-inputs">
          <label class="player-name-input">
            Jugador 1
            <input id="player-name-0" class="player-name-field" type="text" placeholder="Jugador 1" value="Jugador 1" />
          </label>
          <label class="player-name-input">
            Jugador 2
            <input id="player-name-1" class="player-name-field" type="text" placeholder="Jugador 2" value="Jugador 2" />
          </label>
          <label class="player-name-input">
            Jugador 3
            <input id="player-name-2" class="player-name-field" type="text" placeholder="Jugador 3" value="Jugador 3" />
          </label>
          <label class="player-name-input player-name-input-3">
            Jugador 4
            <input id="player-name-3" class="player-name-field" type="text" placeholder="Jugador 4" value="Jugador 4" />
          </label>
          <label class="player-name-input player-name-input-4">
            Jugador 5
            <input id="player-name-4" class="player-name-field" type="text" placeholder="Jugador 5" value="Jugador 5" />
          </label>
          <label class="player-name-input player-name-input-5">
            Jugador 6
            <input id="player-name-5" class="player-name-field" type="text" placeholder="Jugador 6" value="Jugador 6" />
          </label>
          <label class="player-name-input player-name-input-6">
            Jugador 7
            <input id="player-name-6" class="player-name-field" type="text" placeholder="Jugador 7" value="Jugador 7" />
          </label>
        </div>
        <button id="btn-apply-players" class="btn-config" onclick="aplicarConfiguracionJugadores()">Aplicar</button>
      </div>
      <div class="header-controls">
        <div class="turn-indicator">
          <span class="turn-label">Turno de</span>
          <span class="turn-player" id="turn-player-name">Jugador 1</span>
          <span class="turn-info" id="turn-info">Lanza los dados</span>
        </div>
        <div class="dice-area">
          <div class="dice-wrapper">
            <div class="dado" id="dado1">?</div>
            <div class="dado" id="dado2">?</div>
          </div>
          <div class="btn-group">
            <button class="btn-lanzar" id="btn-lanzar" onclick="lanzarDados()">🎲 Lanzar Dados</button>
            <button class="btn-terminar" id="btn-terminar" onclick="terminarTurno()" disabled>✋ Terminar Turno</button>
          </div>
        </div>
        <div class="revelaciones-info" id="revelaciones-info">
          <span>Revelaciones: <strong id="rev-count">0</strong> / 2</span>
          <div class="rev-dots">
            <div class="rev-dot" id="rev-dot-1"></div>
            <div class="rev-dot" id="rev-dot-2"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- TABLERO CENTRAL -->
    <main id="tablero-central">
      <h2 class="zona-titulo">🏠 Tablero Central</h2>
      <div class="perritos-grid" id="tablero-perritos"></div>
    </main>

    <!-- PANELES DE JUGADORES -->
    <section id="jugadores-panel">
      <div class="jugador-card" id="panel-j1" data-jugador="0">
        <div class="jugador-header">
          <span class="jugador-emoji">🧑</span>
          <span class="jugador-nombre">Jugador 1</span>
          <span class="jugador-contador" id="contador-j1">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j1"></div>
      </div>
      <div class="jugador-card" id="panel-j2" data-jugador="1">
        <div class="jugador-header">
          <span class="jugador-emoji">👩</span>
          <span class="jugador-nombre">Jugador 2</span>
          <span class="jugador-contador" id="contador-j2">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j2"></div>
      </div>
      <div class="jugador-card" id="panel-j3" data-jugador="2">
        <div class="jugador-header">
          <span class="jugador-emoji">🧒</span>
          <span class="jugador-nombre">Jugador 3</span>
          <span class="jugador-contador" id="contador-j3">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j3"></div>
      </div>
      <div class="jugador-card" id="panel-j4" data-jugador="3">
        <div class="jugador-header">
          <span class="jugador-emoji">🧑‍🦱</span>
          <span class="jugador-nombre">Jugador 4</span>
          <span class="jugador-contador" id="contador-j4">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j4"></div>
      </div>
      <div class="jugador-card" id="panel-j5" data-jugador="4">
        <div class="jugador-header">
          <span class="jugador-emoji">🧑‍🦰</span>
          <span class="jugador-nombre">Jugador 5</span>
          <span class="jugador-contador" id="contador-j5">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j5"></div>
      </div>
      <div class="jugador-card" id="panel-j6" data-jugador="5">
        <div class="jugador-header">
          <span class="jugador-emoji">🧓</span>
          <span class="jugador-nombre">Jugador 6</span>
          <span class="jugador-contador" id="contador-j6">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j6"></div>
      </div>
      <div class="jugador-card" id="panel-j7" data-jugador="6">
        <div class="jugador-header">
          <span class="jugador-emoji">🧕</span>
          <span class="jugador-nombre">Jugador 7</span>
          <span class="jugador-contador" id="contador-j7">0 🐶</span>
        </div>
        <div class="jugador-perritos" id="perritos-j7"></div>
      </div>
    </section>

  </div>

  <!-- MENSAJE TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
